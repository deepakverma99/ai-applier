services:
  redis:
    image: redis:alpine
    container_name: ai-applier-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: ai-applier-redis-insight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    restart: always

volumes:
  redis-data:
